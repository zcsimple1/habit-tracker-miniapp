<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享卡片 - 月度总结</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .share-card {
      width: 375px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      color: white;
    }
    
    .share-header {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .share-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .share-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .overview-section {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }
    
    .overview-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .overview-item:last-child {
      border-bottom: none;
    }
    
    .overview-label {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .overview-value {
      font-size: 22px;
      font-weight: 700;
    }
    
    .ranking-section {
      margin-bottom: 24px;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    
    .rank-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .rank-1 { background: rgba(255, 215, 0, 0.3); }
    .rank-2 { background: rgba(192, 192, 192, 0.3); }
    .rank-3 { background: rgba(205, 127, 50, 0.3); }
    
    .rank-info {
      flex: 1;
      min-width: 0;
    }
    
    .rank-name {
      font-size: 14px;
      font-weight: 500;
    }
    
    .rank-rate {
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .streak-section {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      text-align: center;
    }
    
    .streak-label {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    
    .streak-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .streak-habit {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .footer {
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 20px;
      margin-top: 20px;
      text-align: center;
    }
    
    .qrcode {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 12px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
    }
    
    .slogan {
      font-size: 13px;
      opacity: 0.9;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="share-card">
    <div class="share-header">
      <div class="share-title">📊 2026年3月打卡报告</div>
      <div class="share-subtitle">习惯打卡，遇见更好的自己</div>
    </div>
    
    <div class="overview-section">
      <div class="overview-item">
        <span class="overview-label">✅ 完成率</span>
        <span class="overview-value">85%</span>
      </div>
      <div class="overview-item">
        <span class="overview-label">📅 活跃天数</span>
        <span class="overview-value">28 天</span>
      </div>
      <div class="overview-item">
        <span class="overview-label">🎯 打卡次数</span>
        <span class="overview-value">127 次</span>
      </div>
    </div>
    
    <div class="ranking-section">
      <div class="section-title">🏆 最佳项目</div>
      <div class="ranking-item">
        <div class="rank-badge rank-1">1</div>
        <div class="rank-info">
          <div class="rank-name">晨跑</div>
        </div>
        <div class="rank-rate">100%</div>
      </div>
      <div class="ranking-item">
        <div class="rank-badge rank-2">2</div>
        <div class="rank-info">
          <div class="rank-name">写日报</div>
        </div>
        <div class="rank-rate">95%</div>
      </div>
      <div class="ranking-item">
        <div class="rank-badge rank-3">3</div>
        <div class="rank-info">
          <div class="rank-name">接孩子</div>
        </div>
        <div class="rank-rate">92%</div>
      </div>
    </div>
    
    <div class="streak-section">
      <div class="streak-label">🔥 最长连续</div>
      <div class="streak-value">15 天</div>
      <div class="streak-habit">项目：晨跑</div>
    </div>
    
    <div class="footer">
      <div class="qrcode">小程序码</div>
      <div class="slogan">开始你的打卡之旅</div>
    </div>
  </div>
</body>
</html>
