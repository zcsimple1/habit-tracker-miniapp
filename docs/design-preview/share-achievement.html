<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享卡片 - 连续打卡成就</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .share-card {
      width: 375px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      color: white;
      text-align: center;
    }
    
    .share-header {
      margin-bottom: 24px;
    }
    
    .share-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .share-subtitle {
      font-size: 14px;
      opacity: 0.9;
    }
    
    .habit-info {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }
    
    .habit-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .habit-name {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .habit-category {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 16px;
    }
    
    .date-range {
      font-size: 13px;
      opacity: 0.85;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .motivational-text {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 24px;
      font-style: italic;
    }
    
    .stats-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 24px;
    }
    
    .stat-box {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 120px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #10b981;
    }
    
    .footer {
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 20px;
      margin-top: 20px;
    }
    
    .qrcode {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 12px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #999;
    }
    
    .invite-text {
      font-size: 13px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="share-card">
    <div class="share-header">
      <div class="share-title">🎉 已连续打卡 100 天！</div>
      <div class="share-subtitle">坚持就是胜利</div>
    </div>
    
    <div class="habit-info">
      <div class="habit-icon">🏃</div>
      <div class="habit-name">晨跑</div>
      <div class="habit-category">❤️ 健康</div>
      <div class="date-range">
        2025.12.20 - 2026.03.30
      </div>
    </div>
    
    <div class="motivational-text">
      💪 每一天的努力，都是更好的自己！
    </div>
    
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">今日</div>
        <div class="stat-value">1/1</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">本月</div>
        <div class="stat-value">100%</div>
      </div>
    </div>
    
    <div class="footer">
      <div class="qrcode">
        小程序码
      </div>
      <div class="invite-text">扫码一起打卡，遇见更好的自己</div>
    </div>
  </div>
</body>
</html>
